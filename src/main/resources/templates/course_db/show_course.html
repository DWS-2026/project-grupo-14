<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Ver cursos - Academia El Soto</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link href="/../css/styles.css" rel="stylesheet" />
</head>

<body id="page-top" class="bg-light d-flex flex-column min-vh-100">
    {{>partials/header}}

    <div style="height:80px"></div>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow rounded-4 p-4">
                <h3 class="text-center mb-4">{{course.courseName}}</h3>
                <p><strong>Profesor:</strong> {{course.teacher}}</p>
                <p><strong>Precio:</strong> {{course.price}} €</p>
                <p><strong>Descripción:</strong> {{course.description}}</p>
                <p><strong>Alumnos:</strong> {{course.students}}</p>

                {{#hasImage}}
                <img src="/course/{{course.id}}/image" alt="Imagen del curso" style="max-width: 400px; height: auto;" />
                {{/hasImage}}

                {{^hasImage}}
                <img src="/no-image.png" alt="Sin imagen" style="max-width: 400px; height: auto;" />
                {{/hasImage}}

                <br><br>

                <div class="d-flex justify-content-between mt-3">
                    <a class="btn btn-secondary" href="/admin/courses/{{course.id}}/edit">Editar Curso</a>
                    <form action="/admin/courses/{{course.id}}/delete" method="post">
                        <button class="btn btn-danger" type="submit">Eliminar Curso</button>
                    </form>
                </div>

                <div class="text-center mt-3">
                    <a class="btn btn-primary" href="/../courses">Volver a Cursos</a>
                </div>
            </div>
        </div>
    </div>

    {{>partials/footer}}
</body>

</html>
