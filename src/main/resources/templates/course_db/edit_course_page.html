<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Editar Curso - Academia El Soto</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <!-- Font Awesome icons -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <!-- Core theme CSS -->
    <link href="/css/styles.css" rel="stylesheet" />
</head>

<body id="page-top">
    {{>partials/header}}

    <div style="height:80px"></div>

    <section class="page-section bg-light" style="padding-top:120px;">
        <div class="container">

            <div class="text-center mb-5">
                <h2 class="section-heading text-uppercase">Editar curso</h2>
                <h3 class="section-subheading text-muted">Panel de administración</h3>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <form class="bg-white p-4 rounded shadow" action="/admin/courses/{{course.id}}/edit" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="_csrf" value="{{token}}" />
                        <!-- Edit course form -->

                        <div class="mb-3">
                            <label class="form-label">Nombre del curso</label>
                            <input type="text" name="courseName" class="form-control" value="{{course.courseName}}"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profesor</label>
                            <input type="text" name="teacher" class="form-control" value="{{course.teacher}}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio (€)</label>
                            <input type="number" name="price" class="form-control" value="{{course.price}}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            <textarea name="description" class="form-control" rows="4"
                                required>{{course.description}}</textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Alumnos</label>
                            <input type="number" name="students" class="form-control" value="{{course.students}}"
                                required>
                        </div>

                        <input type="hidden" name="id" value="{{course.id}}" />

                        <div class="text-center mt-4">
                            <button class="btn btn-primary btn-xl text-uppercase" type="submit">
                                Guardar cambios
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </section>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/scripts.js"></script>
</body>

</html>
