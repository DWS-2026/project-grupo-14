<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Academia El Soto - Admin</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body id="page-top" class="d-flex flex-column min-vh-100">
    {{>partials/header}}

    <div style="height:80px"></div>

    <div class="container flex-grow-1 py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="card shadow rounded-4 p-4 mb-4">
                    <div class="d-flex align-items-center gap-4">
                        <div class="rounded-circle bg-primary text-white d-flex justify-content-center align-items-center"
                            style="width:80px;height:80px;font-size:32px;">
                            AD
                        </div>
                        <div>
                            <h4 class="mb-1">Estadísticas de los cursos</h4>
                        </div>
                    </div>
                </div>

                <div class="card shadow rounded-4 p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="mb-0">Gestión de cursos</h5>
                        <a href="/admin_create_course" class="btn btn-primary">
                            <i class="fas fa-plus me-2"></i>Añadir curso
                        </a>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead>
                                <tr>
                                    <th>Curso</th>
                                    <th>Profesor</th>
                                    <th>Alumnos</th>
                                    <th>Precio</th>
                                    <th class="text-center">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{#courses}}
                                <tr>
                                    <td class="fw-bold">{{courseName}}</td>
                                    <td>{{teacher}}</td>
                                    <td>{{students}}</td>
                                    <td>{{price}} $</td>
                                    <td class="text-center">
                                        <a href="/edit-course/{{id}}" class="btn btn-sm btn-outline-primary me-1"
                                            title="Editar curso">
                                            <i class="fas fa-pen"></i> Editar
                                        </a>
                                        <form action="/course/{{id}}/delete" method="POST" style="display:inline;"
                                            onsubmit="return confirm('¿Estás seguro de que deseas borrar este curso de la base de datos?');">
                                            <button class="btn btn-sm btn-outline-danger" type="submit"
                                                title="Borrar curso">
                                                <i class="fas fa-trash"></i> Borrar
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                {{/courses}}

                                {{^courses}}
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">No hay cursos registrados en el
                                        sistema.</td>
                                </tr>
                                {{/courses}}
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
