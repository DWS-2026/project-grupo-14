<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Editar Curso - Academia El Soto</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Font Awesome icons -->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts -->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <!-- Core theme CSS -->
    <link href="../css/styles.css" rel="stylesheet" />
</head>

<body id="page-top">
    <!-- Navigation-->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-dark" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="/index">
                <img src="../assets/img/ELSOTO.png" alt="..." class="logo-elsoto" />
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                Menu <i class="fas fa-bars ms-1"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0">
                    <li class="nav-item"><a class="nav-link" href="/informacion">Información</a></li>
                    <li class="nav-item"><a class="nav-link" href="/cursos">Cursos</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profesores">Profesores</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-outline-light px-4" href="/admin">Admin</a></li>
                    <li class="nav-item ms-lg-3" id="carrito_compra">
                        <a class="nav-link" href="/carrito"><i class="fa-solid fa-cart-shopping fa-xl"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div style="height:80px"></div>

    <section class="page-section bg-light" style="padding-top:120px;">
        <div class="container">

            <div class="text-center mb-5">
                <h2 class="section-heading text-uppercase">Editar curso</h2>
                <h3 class="section-subheading text-muted">Panel de administración</h3>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <form class="bg-white p-4 rounded shadow" action="/editedcurso/{{curso.id}}" method="post"> <!-- Corregir el action -->

                        <div class="mb-3">
                            <label class="form-label">Nombre del curso</label>
                            <input type="text" name="nombreCurso" class="form-control" value="{{curso.nombreCurso}}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profesor</label>
                            <input type="text" name="profesor" class="form-control" value="{{curso.profesor}}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio (€)</label>
                            <input type="number" name="precio" class="form-control" value="{{curso.precio}}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" class="form-control" rows="4" required>{{curso.descripcion}}</textarea>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Alumnos</label>
                            <input type="number" name="alumnos" class="form-control" value="{{curso.alumnos}}" required>
                        </div>

                        <input type="hidden" name="id" value="{{curso.id}}"/>

                        <div class="text-center mt-4">
                            <button class="btn btn-primary btn-xl text-uppercase" type="submit">
                                Guardar cambios
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </section>

    <!-- Footer-->
    <footer class="footer py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-4 text-lg-start">Copyright &copy; Your Website 2023</div>
                <div class="col-lg-4 my-3 my-lg-0">
                    <a class="btn btn-dark btn-social mx-2" href="#!" aria-label="Twitter"><i
                            class="fab fa-twitter"></i></a>
                    <a class="btn btn-dark btn-social mx-2" href="#!" aria-label="Facebook"><i
                            class="fab fa-facebook-f"></i></a>
                    <a class="btn btn-dark btn-social mx-2" href="#!" aria-label="LinkedIn"><i
                            class="fab fa-linkedin-in"></i></a>
                </div>
                <div class="col-lg-4 text-lg-end">
                    <a class="link-dark text-decoration-none me-3" href="#!">Privacy Policy</a>
                    <a class="link-dark text-decoration-none" href="#!">Terms of Use</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
