<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Academia El Soto</title>
    <!-- Favicon-->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body id="page-top">
    <!-- Navigation-->
    {{>partials/header}}

    <div style="height:80px"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <div class="card shadow rounded-4 p-4">

                    <h4 class="mb-4 text-center">Editar curso</h4>

                    <form>

                        <div class="mb-3">
                            <label class="form-label">Nombre del curso</label>
                            <input type="text" class="form-control" value="Matemática Discreta y Álgebra">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Profesor</label>
                            <input type="text" class="form-control" value="Frenando Alonso">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Precio (€)</label>
                            <input type="number" class="form-control" value="130">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Imagen del curso</label>
                            <input type="file" class="form-control">
                            <small class="text-muted">Si no subes una nueva imagen se mantendrá la actual</small>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control"
                                rows="4">Curso completo de matemáticas aplicadas para ingeniería.</textarea>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/admin_statistics" class="btn btn-outline-secondary">
                                Cancelar
                            </a>

                            <button class="btn btn-primary">
                                Guardar cambios
                            </button>
                        </div>

                    </form>

                </div>

            </div>
        </div>
    </div>

    {{>partials/footer}}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
