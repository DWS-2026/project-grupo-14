<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Academia El Soto - Registro</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link href="../css/styles.css" rel="stylesheet" />
</head>

<body id="page-top" class="bg-light d-flex flex-column min-vh-100">
    {{>partials/header}}

    <div style="height:80px"></div>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow rounded-4 p-4">
                <h3 class="text-center mb-4">Crear cuenta</h3>

                {{#error}}
                <div class="alert alert-danger text-center shadow-sm">
                    <strong>¡Atención!</strong> {{error}}
                </div>
                {{/error}}

                <form action="/register" method="POST">
                    <input type="hidden" name="_csrf" value="{{token}}" />
                    <div class="mb-3">
                        <label>Nombre</label>
                        <input type="text" class="form-control" name="userName" placeholder="Tu nombre" required>
                    </div>
                    <div class="mb-3">
                        <label>Apellidos</label>
                        <input type="text" class="form-control" name="lastName" placeholder="Tus apellidos" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" name="email" placeholder="usuario@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label>Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="mb-3">
                        <label>Repetir contraseña</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Registrarse</button>
                </form>

                <p class="text-center mt-4 mb-0">
                    ¿Ya tienes cuenta?
                    <a href="/login" class="fw-bold text-decoration-none">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>

    {{>partials/footer}}
</body>

</html>
