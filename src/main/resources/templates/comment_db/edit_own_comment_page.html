<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar comentario</title>

    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="/css/styles.css" rel="stylesheet" />
</head>
<body id="page-top">

    {{>partials/header}}

    <section class="page-section bg-light" style="padding-top: 8rem;">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="section-heading text-uppercase">Editar tu comentario</h2>
                <h3 class="section-subheading text-muted">Modifica el texto de tu comentario</h3>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <form class="bg-white p-4 rounded shadow"
                          action="/profile/comments/{{comment.id}}/edit"
                          method="post">

                        <input type="hidden" name="_csrf" value="{{token}}" />

                        <div class="mb-3">
                            <label class="form-label">Comentario</label>
                            <textarea class="form-control"
                                      name="description"
                                      rows="5"
                                      maxlength="500"
                                      required>{{comment.description}}</textarea>
                            <small class="text-muted">Máximo 500 caracteres</small>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/profile" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">
                                Guardar cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/scripts.js"></script>
</body>
</html>
