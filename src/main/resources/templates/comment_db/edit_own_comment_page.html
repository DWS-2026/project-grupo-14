<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar comentario</title>

    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="/css/styles.css" rel="stylesheet" />
    
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0-rc.2/dist/quill.snow.css" rel="stylesheet" />
    <style>
        .ql-container { height: 200px; background: white; font-size: 16px; }
    </style>
</head>
<body id="page-top">

    {{>partials/header}}

    <section class="page-section bg-light" style="padding-top: 8rem;">
        <div class="container">
            <div class="text-center mb-5">
                <h2 class="section-heading text-uppercase">Editar tu comentario</h2>
                <h3 class="section-subheading text-muted">Modifica el texto de tu comentario</h3>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <form class="bg-white p-4 rounded shadow"
                          action="/profile/comments/{{comment.id}}/edit"
                          method="post">

                        <input type="hidden" name="_csrf" value="{{token}}" />

                        <div class="mb-3">
                            <label class="form-label">Comentario</label>
                            
                            <input type="hidden" name="description" id="description-input">
                            
                            <div id="editor">
                                {{{comment.description}}}
                            </div>
                            
                            <small class="text-muted">Máximo 500 caracteres</small>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/profile" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary">
                                Guardar cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/scripts.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0-rc.2/dist/quill.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const quill = new Quill('#editor', {
                theme: 'snow',
                placeholder: 'Edita tu comentario...'
            });

            const input = document.getElementById('description-input');

            // Cargamos el contenido inicial en el input oculto por si el usuario no toca nada y guarda
            input.value = quill.root.innerHTML;

            // Actualizamos el input cada vez que el usuario escriba
            quill.on('text-change', function() {
                const html = quill.root.innerHTML;
                input.value = (html === '<p><br></p>') ? '' : html;
            });
        });
    </script>
</body>
</html>
