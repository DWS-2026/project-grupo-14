<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Editar Comentario - Admin</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link href="/css/styles.css" rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.0-rc.2/dist/quill.snow.css" rel="stylesheet" />
    <style>
        .ql-container {
            height: 200px;
            background: white;
            font-size: 1rem;
        }
    </style>
</head>

<body id="page-top">
    {{>partials/header}}

    <div style="height:80px"></div>

    <section class="page-section bg-light" style="padding-top:120px;">
        <div class="container">

            <div class="text-center mb-5">
                <h2 class="section-heading text-uppercase">Editar comentario</h2>
                <h3 class="section-subheading text-muted">Panel de administración</h3>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <form class="bg-white p-4 rounded shadow" action="/admin/comments/{{comment.id}}/edit" method="post">
                        <input type="hidden" name="_csrf" value="{{token}}" />

                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" name="user" class="form-control" value="{{comment.user}}" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Descripción</label>
                            
                            <input type="hidden" name="description" id="admin-description-input">
                            
                            <div id="admin-editor">
                                {{{comment.description}}}
                            </div>
                            
                            <small class="text-muted">Máximo 500 caracteres</small>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Curso</label>
                            <p class="form-control-plaintext">{{#comment.course}}{{courseName}}{{/comment.course}}</p>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha</label>
                            <p class="form-control-plaintext">{{comment.formattedDate}}</p>
                        </div>

                        <input type="hidden" name="id" value="{{comment.id}}" />

                        <div class="text-center mt-4">
                            <button class="btn btn-primary btn-xl text-uppercase" type="submit">
                                Guardar cambios
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </section>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/scripts.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.0-rc.2/dist/quill.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const quill = new Quill('#admin-editor', {
                theme: 'snow',
                placeholder: 'Edita el comentario del usuario...'
            });

            const inputHidden = document.getElementById('admin-description-input');

            // Sincronización inicial para asegurar que el contenido se envíe si no hay cambios
            inputHidden.value = quill.root.innerHTML;

            // Actualización en cada cambio
            quill.on('text-change', function() {
                const html = quill.root.innerHTML;
                inputHidden.value = (html === '<p><br></p>') ? '' : html;
            });
        });
    </script>
</body>

</html>
