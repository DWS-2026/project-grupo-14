<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Ver Comentario - Academia El Soto</title>
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link href="/../css/styles.css" rel="stylesheet" />
</head>

<body id="page-top" class="bg-light d-flex flex-column min-vh-100">
    {{>partials/header}}

    <div style="height:80px"></div>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow rounded-4 p-4">
                <h3 class="text-center mb-4">Comentario de {{comment.user}}</h3>

                <p><strong>Usuario:</strong> {{comment.user}}</p>
                <p><strong>Descripción:</strong> {{{comment.description}}}</p>
                <p><strong>Fecha de publicación:</strong> {{comment.publicationDate}}</p>

                <div class="d-flex justify-content-between mt-3">
                    <a class="btn btn-secondary" href="/admin/comments/{{comment.id}}/edit">Editar Comentario</a>
                    <form action="/admin/comments/{{comment.id}}/delete" method="post">
                        <input type="hidden" name="_csrf" value="{{token}}" />
                        <button class="btn btn-danger" type="submit">Eliminar Comentario</button>
                    </form>
                </div>

                <div class="text-center mt-3">
                    <a class="btn btn-primary" href="/admin/comment">Volver a Comentarios</a>
                </div>
            </div>
        </div>
    </div>

    {{>partials/footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/scripts.js"></script>
</body>

</html>
