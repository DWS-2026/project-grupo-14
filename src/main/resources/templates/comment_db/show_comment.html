<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Ver Comentario - Academia El Soto</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Roboto+Slab:400,100,300,700" rel="stylesheet" type="text/css" />
    <link href="/../css/styles.css" rel="stylesheet" />
</head>

<body id="page-top" class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-dark" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="/index">
                <img src="/../assets/img/ELSOTO.png" alt="..." class="logo-elsoto" /></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                Menu
                <i class="fas fa-bars ms-1"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav text-uppercase ms-auto py-4 py-lg-0 align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="/../information">Información</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/../courses">Cursos</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-light px-4" href="/auth/login">Login</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-light px-4" href="/../admin">Admin</a>
                    </li>
                    <li class="nav-item ms-lg-3" id="cart_purchase">
                        <a class="nav-link" href="/../cart">
                            <i class="fa-solid fa-cart-shopping fa-xl"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div style="height:80px"></div>

    <div class="container flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow rounded-4 p-4">
                <h3 class="text-center mb-4">Comentario de {{comment.user}}</h3>

                <p><strong>Usuario:</strong> {{comment.user}}</p>
                <p><strong>Descripción:</strong> {{comment.description}}</p>
                <p><strong>Fecha de publicación:</strong> {{comment.publicationDate}}</p>

                <div class="d-flex justify-content-between mt-3">
                    <a class="btn btn-secondary" href="/edit-comment/{{comment.id}}">Editar Comentario</a>
                    <form action="/comment/{{comment.id}}/delete" method="post">
                        <button class="btn btn-danger" type="submit">Eliminar Comentario</button>
                    </form>
                </div>

                <div class="text-center mt-3">
                    <a class="btn btn-primary" href="/../admin_comment">Volver a Comentarios</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-4 text-lg-start">Copyright &copy; Your Website 2023</div>
                <div class="col-lg-4 my-3 my-lg-0">
                    <a class="btn btn-dark btn-social mx-2" href="#!" aria-label="Twitter"><i
                            class="fab fa-twitter"></i></a>
                    <a class="btn btn-dark btn-social mx-2" href="#!" aria-label="Facebook"><i
                            class="fab fa-facebook-f"></i></a>
                    <a class="btn btn-dark btn-social mx-2" href="#!" aria-label="LinkedIn"><i
                            class="fab fa-linkedin-in"></i></a>
                </div>
                <div class="col-lg-4 text-lg-end">
                    <a class="link-dark text-decoration-none me-3" href="#!">Privacy Policy</a>
                    <a class="link-dark text-decoration-none" href="#!">Terms of Use</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
</body>

</html>
